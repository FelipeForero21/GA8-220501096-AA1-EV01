# Workflow de CI/CD para Metro de Medellín
# Ejecuta linting, pruebas y build en cada push/PR

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: metro-app/package-lock.json

      - name: Instalar dependencias
        working-directory: metro-app
        run: npm ci

      - name: Generar cliente de Prisma
        working-directory: metro-app
        run: npx prisma generate

      - name: Ejecutar linting
        working-directory: metro-app
        run: npm run lint

      - name: Ejecutar pruebas
        working-directory: metro-app
        run: npm run test -- --coverage

      - name: Build de producción
        working-directory: metro-app
        run: npm run build
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          NEXTAUTH_SECRET: "ci-test-secret"
          AUTH_SECRET: "ci-test-secret"
          UPSTASH_REDIS_REST_URL: "https://fake.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "fake-token"
